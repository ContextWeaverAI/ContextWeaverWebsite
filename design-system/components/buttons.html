<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Buttons · ContextWeaver</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --background: oklch(0.975 0.004 80);
    --foreground: oklch(0.2 0.005 60);
    --muted-foreground: oklch(0.48 0.008 60);
    --card: oklch(0.995 0.002 80);
    --primary: oklch(0.22 0.008 60);
    --primary-foreground: oklch(0.98 0.003 80);
    --secondary: oklch(0.94 0.005 80);
    --accent-cta: oklch(0.62 0.21 35);
    --orange: oklch(0.62 0.21 35);
    --border: oklch(0.88 0.006 80);
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Outfit", system-ui, sans-serif; color: var(--foreground);
    background: var(--background); padding: 48px; }
  h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 4px; }
  .sub { color: var(--muted-foreground); font-size: 0.9rem; margin: 0 0 32px; }
  h2 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.16em; color: var(--orange);
    font-weight: 600; margin: 30px 0 14px; }
  .row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    font-family: inherit; font-weight: 500; font-size: 0.875rem; border: 1px solid transparent;
    border-radius: 9999px; padding: 0 20px; height: 40px; cursor: pointer; transition: all 0.3s ease;
    text-decoration: none; }
  .arrow { width: 15px; height: 15px; }
  /* btn-gradient (primary) */
  .btn-gradient { background: linear-gradient(135deg, var(--primary), oklch(0.3 0.01 60));
    color: var(--primary-foreground); }
  .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px oklch(0.2 0.005 60 / 0.35); }
  /* btn-cta (amber) */
  .btn-cta { background: linear-gradient(135deg, var(--accent-cta), oklch(0.7 0.2 45));
    color: var(--primary-foreground); }
  .btn-cta:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px oklch(0.7 0.18 55 / 0.4); }
  /* secondary */
  .btn-secondary { background: var(--secondary); color: var(--foreground); }
  .btn-secondary:hover { background: oklch(0.9 0.005 80); }
  /* outline */
  .btn-outline { background: var(--background); color: var(--foreground); border-color: var(--border);
    box-shadow: 0 1px 2px oklch(0.2 0.005 60 / 0.05); }
  .btn-outline:hover { background: var(--secondary); }
  /* ghost */
  .btn-ghost { background: transparent; color: var(--foreground); }
  .btn-ghost:hover { background: var(--secondary); }
  /* link */
  .btn-link { background: transparent; color: var(--foreground); padding: 0 4px;
    text-underline-offset: 4px; }
  .btn-link:hover { text-decoration: underline; text-decoration-color: var(--orange); }
  /* sizes */
  .sm { height: 32px; font-size: 0.8rem; padding: 0 14px; }
  .lg { height: 48px; font-size: 1rem; padding: 0 28px; }
</style>
</head>
<body>
  <h1>Buttons</h1>
  <p class="sub">Pill geometry, gradient fills, and a firm 2px lift on hover. Amber is reserved for the primary conversion CTA.</p>

  <h2>Variants</h2>
  <div class="row">
    <a class="btn btn-gradient">Book a demo <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg></a>
    <a class="btn btn-cta">Get started <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a>
    <a class="btn btn-secondary">Secondary</a>
    <a class="btn btn-outline">Talk to founder</a>
    <a class="btn btn-ghost">Ghost</a>
    <a class="btn btn-link">Learn more</a>
  </div>

  <h2>Sizes</h2>
  <div class="row">
    <a class="btn btn-gradient sm">Small</a>
    <a class="btn btn-gradient">Default</a>
    <a class="btn btn-gradient lg">Large</a>
  </div>
</body>
</html>
